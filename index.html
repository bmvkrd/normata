<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Normata Signals — quiet intelligence for engineering managers</title>
  <link rel="icon" href="assets/favicon.svg"/>
  <style>
/* ============================================================
   Normata Signals — Colors, Type & Foundations
   Single brand typeface: Anonymice Pro Nerd Font.
   Palette: "Chasers in Black" — dark canvas, amber signal,
   red for the rare actually-urgent moment.
   ============================================================ */

/* ---------- Propo (proportional) ---------- */
@font-face {
  font-family: 'AnonymiceProNerdPropo';
  src: url('./fonts/AnonymiceProNerdFontPropo-Regular.ttf') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerdPropo';
  src: url('./fonts/AnonymiceProNerdFontPropo-Italic.ttf') format('truetype');
  font-weight: 400; font-style: italic; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerdPropo';
  src: url('./fonts/AnonymiceProNerdFontPropo-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerdPropo';
  src: url('./fonts/AnonymiceProNerdFontPropo-BoldItalic.ttf') format('truetype');
  font-weight: 700; font-style: italic; font-display: swap;
}

/* ---------- Default (mono with icons) ---------- */
@font-face {
  font-family: 'AnonymiceProNerd';
  src: url('./fonts/AnonymiceProNerdFont-Regular.ttf') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerd';
  src: url('./fonts/AnonymiceProNerdFont-Italic.ttf') format('truetype');
  font-weight: 400; font-style: italic; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerd';
  src: url('./fonts/AnonymiceProNerdFont-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerd';
  src: url('./fonts/AnonymiceProNerdFont-BoldItalic.ttf') format('truetype');
  font-weight: 700; font-style: italic; font-display: swap;
}

/* ---------- Mono (strict mono) ---------- */
@font-face {
  font-family: 'AnonymiceProNerdMono';
  src: url('./fonts/AnonymiceProNerdFontMono-Regular.ttf') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerdMono';
  src: url('./fonts/AnonymiceProNerdFontMono-Italic.ttf') format('truetype');
  font-weight: 400; font-style: italic; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerdMono';
  src: url('./fonts/AnonymiceProNerdFontMono-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'AnonymiceProNerdMono';
  src: url('./fonts/AnonymiceProNerdFontMono-BoldItalic.ttf') format('truetype');
  font-weight: 700; font-style: italic; font-display: swap;
}

:root {
  /* -------- Brand palette · Chasers in Black -------- */
  --ink:           #1B1A1A;
  --ink-2:         #2A2828;
  --slate:         #444141;
  --mist-slate:    #888383;
  --amber:         #F09F38;
  --amber-deep:    #C77E1F;
  --amber-dim:     #A87938;
  --red:           #BE2121;
  --red-deep:      #921818;
  --warm:          #2A2418;
  --paper:         #2A2828;
  --paper-light:   #f3eee3;
  --fg-warm:       #EFE9DD;
  --white:         #ffffff;

  /* -------- Back-compat aliases -------- */
  --sage:        var(--amber);
  --sage-deep:   var(--amber-deep);
  --mint:        var(--amber-dim);
  --cream:       var(--warm);
  --mist:        var(--ink);

  /* -------- Semantic surfaces · dark default -------- */
  --bg:            var(--ink);
  --bg-paper:      var(--ink-2);
  --bg-card:       var(--ink-2);
  --bg-highlight:  var(--warm);
  --bg-sunken:     #141313;
  --bg-inverse:    var(--paper-light);

  /* -------- Foreground · on dark -------- */
  --fg-1:          var(--fg-warm);
  --fg-2:          rgba(239, 233, 221, 0.68);
  --fg-3:          rgba(239, 233, 221, 0.44);
  --fg-mute:       rgba(239, 233, 221, 0.26);
  --fg-on-ink:     var(--fg-warm);
  --fg-on-ink-2:   rgba(239, 233, 221, 0.68);
  --fg-on-ink-3:   rgba(239, 233, 221, 0.44);
  --fg-on-amber:   var(--ink);
  --fg-on-red:     var(--fg-warm);
  --fg-on-cream:   var(--fg-warm);
  --fg-on-light:   var(--ink);

  /* -------- Borders & dividers -------- */
  --border-1:      rgba(239, 233, 221, 0.08);
  --border-2:      rgba(239, 233, 221, 0.16);
  --border-on-ink: rgba(239, 233, 221, 0.08);
  --hairline-amber: rgba(240, 159, 56, 0.42);
  --hairline-sage: var(--hairline-amber);

  /* -------- Accents -------- */
  --accent:           var(--amber);
  --accent-hover:     #F7B45C;
  --accent-pressed:   var(--amber-deep);
  --accent-soft:      rgba(240, 159, 56, 0.14);
  --info:             var(--amber-dim);
  --info-soft:        rgba(168, 121, 56, 0.18);
  --danger:           var(--red);
  --danger-soft:      rgba(190, 33, 33, 0.18);

  /* -------- Shadows -------- */
  --shadow-subtle:    0 1px 2px rgba(0,0,0,0.32);
  --shadow-lifted:    0 12px 28px -10px rgba(0,0,0,0.55),
                      0 2px 4px -2px rgba(0,0,0,0.35);
  --shadow-focus:     0 0 0 2px var(--bg), 0 0 0 4px var(--amber);

  /* -------- Radii -------- */
  --radius-xs:        4px;
  --radius-md:        10px;
  --radius-pill:      999px;

  /* -------- Spacing (4px base) -------- */
  --s-1:    4px;   --s-2:    8px;   --s-3:    12px;  --s-4:    16px;
  --s-6:    24px;  --s-8:    32px;  --s-12:   48px;  --s-16:   64px;
  --s-24:   96px;  --s-32:  128px;

  /* -------- Type families -------- */
  --font-prop:    'AnonymiceProNerdPropo', 'AnonymousPro', ui-monospace, monospace;
  --font-mono:    'AnonymiceProNerd', 'AnonymousPro', ui-monospace, monospace;
  --font-strict:  'AnonymiceProNerdMono', 'AnonymousPro', ui-monospace, monospace;
  --font-display: var(--font-prop);
  --font-sans:    var(--font-prop);
  --font-serif:   var(--font-prop);

  /* -------- Type sizes -------- */
  --t-display:     64px;
  --t-h1:          44px;
  --t-h2:          30px;
  --t-h3:          22px;
  --t-h4:          17px;
  --t-body:        15px;
  --t-body-sm:     13px;
  --t-caption:     12px;
  --t-overline:    11px;

  /* -------- Motion -------- */
  --ease:        cubic-bezier(0.2, 0, 0, 1);
  --dur-fast:    150ms;
  --dur-base:    250ms;
  --dur-slow:    400ms;
}

html, body {
  background: var(--bg);
  color: var(--fg-1);
  font-family: var(--font-prop);
  font-size: var(--t-body);
  line-height: 1.55;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection { background: var(--amber); color: var(--ink); }

h1, h2, h3, h4 {
  font-family: var(--font-prop);
  color: var(--fg-1);
  margin: 0;
  font-weight: 700;
  letter-spacing: -0.01em;
}
h1 { font-size: var(--t-h1); line-height: 1.08; letter-spacing: -0.02em; }
h2 { font-size: var(--t-h2); line-height: 1.18; letter-spacing: -0.015em; }
h3 { font-size: var(--t-h3); line-height: 1.3;  font-weight: 700; }
h4 { font-size: var(--t-h4); line-height: 1.35; font-weight: 700; }

p  { margin: 0; font-size: var(--t-body); line-height: 1.55; color: var(--fg-1); }

.italic-voice, .voice {
  font-family: var(--font-prop);
  font-style: italic;
  font-weight: 400;
  color: var(--amber);
}

.lede {
  font-family: var(--font-prop);
  font-style: italic;
  font-size: 20px;
  line-height: 1.45;
  color: var(--fg-2);
  font-weight: 400;
}

small, .caption {
  font-size: var(--t-caption);
  color: var(--fg-3);
  line-height: 1.4;
  font-family: var(--font-mono);
}

.overline {
  font-family: var(--font-mono);
  font-size: var(--t-overline);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--fg-3);
}

code, kbd, .mono {
  font-family: var(--font-mono);
  font-size: 0.92em;
}

.tabular {
  font-family: var(--font-strict);
  font-variant-numeric: tabular-nums;
}

a {
  color: var(--fg-1);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--dur-fast) var(--ease);
}
a:hover { border-bottom-color: var(--amber); }

button { font-family: inherit; }

.surface-ink   { background: var(--ink);   color: var(--fg-on-ink); }
.surface-paper { background: var(--paper); color: var(--fg-1); }
.surface-mist  { background: var(--ink);   color: var(--fg-1); }
.surface-cream { background: var(--warm);  color: var(--fg-on-cream); }

.hairline {
  height: 1px;
  background: var(--hairline-amber);
  border: 0;
  margin: var(--s-6) 0;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border-1);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-subtle);
  padding: var(--s-6);
}

</style>
  <style>
    /* ========= Page base ========= */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--ink); color: var(--fg-warm); font-family: var(--font-prop); font-size: 16px; line-height: 1.55; }
    .container { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
    .container.tight { max-width: 920px; }
    .container.narrow { max-width: 720px; }

    /* ========= Nav ========= */
    .mk-nav { padding: 22px 0; border-bottom: 1px solid var(--border-1); position: sticky; top: 0; background: rgba(27,26,26,0.86); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 50; }
    .mk-nav .row { display: flex; align-items: center; gap: 24px; }
    .mk-nav .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; border-bottom: 0; }
    .mk-nav .brand .word { font-family: var(--font-prop); font-style: italic; font-weight: 700; font-size: 22px; color: var(--fg-warm); letter-spacing: -0.01em; }
    .mk-nav .brand .sub { font-family: var(--font-prop); font-weight: 400; font-size: 11px; letter-spacing: 0.22em; color: var(--amber); margin-left: 4px; padding-top: 4px; }
    .mk-nav .links { margin-left: auto; display: flex; gap: 24px; align-items: center; }
    .mk-nav .links .cta { background: var(--amber); color: var(--ink); padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; transition: background var(--dur-fast) var(--ease); border-bottom: 0; }
    .mk-nav .links .cta:hover { background: var(--accent-hover); color: var(--ink); }

    /* ========= Hero ========= */
    .hero { padding: 96px 0 80px; display: grid; grid-template-columns: 1.05fr 1fr; gap: 72px; align-items: center; }
    .hero .eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); margin-bottom: 22px; display: flex; align-items: center; gap: 10px; }
    .hero .eyebrow .ridge { width: 28px; height: 1px; background: var(--hairline-amber); }
    .hero h1 { font-family: var(--font-prop); font-weight: 700; font-size: 64px; line-height: 1.02; letter-spacing: -0.028em; color: var(--fg-warm); margin: 0 0 24px; }
    .hero h1 .it { font-style: italic; font-weight: 400; color: var(--amber); }
    .hero .lede { font-family: var(--font-prop); font-style: italic; font-size: 19px; color: rgba(239,233,221,0.74); margin: 0 0 36px; max-width: 520px; line-height: 1.55; text-wrap: pretty; }
    .hero .meta { display: flex; flex-wrap: wrap; gap: 8px 22px; margin-top: 24px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mist-slate); }
    .hero .meta .item { display: inline-flex; align-items: center; gap: 8px; }
    .hero .meta .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--amber); display: inline-block; }

    /* ========= Inline email form ========= */
    .form-card { display: flex; flex-direction: column; gap: 10px; max-width: 520px; }
    .form-row { display: flex; gap: 8px; background: var(--paper); border: 1px solid var(--border-1); border-radius: 999px; padding: 6px 6px 6px 18px; transition: border-color var(--dur-fast) var(--ease); }
    .form-row:focus-within { border-color: var(--amber); box-shadow: 0 0 0 3px var(--accent-soft); }
    .form-row input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg-warm); font-family: var(--font-prop); font-size: 15px; padding: 10px 4px; min-width: 0; }
    .form-row input::placeholder { color: var(--fg-3); }
    .form-row button { background: var(--amber); color: var(--ink); padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 700; border: 0; cursor: pointer; font-family: var(--font-prop); white-space: nowrap; transition: background var(--dur-fast) var(--ease); display: inline-flex; align-items: center; gap: 6px; }
    .form-row button:hover { background: var(--accent-hover); }
    .form-row button:active { background: var(--accent-pressed); transform: scale(0.99); }
    .form-row button:disabled { background: var(--slate); color: var(--fg-3); cursor: not-allowed; }
    .form-meta { display: flex; gap: 16px; padding-left: 4px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); }
    .form-meta label { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; color: var(--fg-2); }
    .form-meta input[type="radio"] { appearance: none; width: 12px; height: 12px; border: 1px solid var(--border-2); border-radius: 999px; margin: 0; position: relative; cursor: pointer; }
    .form-meta input[type="radio"]:checked { border-color: var(--amber); }
    .form-meta input[type="radio"]:checked::after { content: ""; position: absolute; inset: 2px; background: var(--amber); border-radius: 999px; }
    .form-error { font-family: var(--font-mono); font-size: 12px; color: var(--red); padding-left: 18px; }
    .form-success { background: var(--accent-soft); border: 1px solid var(--hairline-amber); border-radius: 14px; padding: 18px 22px; display: flex; gap: 14px; align-items: flex-start; }
    .form-success .ic { font-family: var(--font-mono); color: var(--amber); font-size: 22px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .form-success .cap { font-family: var(--font-prop); font-style: italic; font-size: 15px; color: var(--amber); margin-bottom: 4px; }
    .form-success .body { font-size: 14px; color: var(--fg-1); line-height: 1.55; }
    .form-success .body .m { font-family: var(--font-mono); background: rgba(239,233,221,0.06); padding: 1px 6px; border-radius: 3px; color: var(--fg-warm); font-size: 12.5px; }

    /* ========= Hero preview (briefing mock) ========= */
    .hero-preview { background: var(--paper); border-radius: 14px; padding: 26px 28px 22px; box-shadow: var(--shadow-lifted); border: 1px solid var(--border-1); display: flex; flex-direction: column; gap: 14px; position: relative; }
    .hero-preview .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .hero-preview .label .live { background: rgba(240,159,56,0.14); color: var(--amber); padding: 3px 10px; border-radius: 999px; letter-spacing: 0.08em; text-transform: none; display: inline-flex; align-items: center; gap: 6px; }
    .hero-preview .label .live .pulse { width: 6px; height: 6px; border-radius: 999px; background: var(--amber); animation: pulse 2s var(--ease) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .hero-preview .voice { font-family: var(--font-prop); font-style: italic; font-size: 19px; color: var(--amber); }
    .hero-preview h3 { font-family: var(--font-prop); font-weight: 700; font-size: 23px; color: var(--fg-warm); margin: 0; letter-spacing: -0.015em; line-height: 1.2; text-wrap: pretty; }
    .hero-preview hr { border: 0; height: 1px; background: var(--hairline-amber); margin: 2px 0; }
    .hero-preview .item { display: grid; grid-template-columns: 20px 1fr; gap: 12px; font-size: 13.5px; line-height: 1.55; color: rgba(239,233,221,0.8); padding: 8px 0; border-bottom: 1px solid var(--border-1); }
    .hero-preview .item:last-of-type { border-bottom: 0; padding-bottom: 4px; }
    .hero-preview .item .cap { font-family: var(--font-prop); font-style: italic; font-size: 12.5px; color: var(--amber); margin-bottom: 2px; opacity: 0.85; }
    .hero-preview .item .b { color: var(--fg-warm); font-weight: 700; }
    .hero-preview .item .m { font-family: var(--font-mono); font-size: 12px; background: rgba(239,233,221,0.06); padding: 1px 5px; border-radius: 3px; color: var(--fg-warm); }
    .hero-preview .actions { display: flex; gap: 8px; padding-top: 8px; flex-wrap: wrap; }
    .hero-preview .actions .chip { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; background: transparent; border: 1px solid var(--border-2); color: var(--fg-2); padding: 6px 10px; border-radius: 999px; cursor: pointer; transition: all var(--dur-fast) var(--ease); }
    .hero-preview .actions .chip:hover { border-color: var(--amber); color: var(--amber); }
    .hero-preview .actions .chip.tick { color: var(--amber); border-color: rgba(240,159,56,0.4); }
    .hero-preview .footnote { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); padding-top: 6px; border-top: 1px dashed var(--border-1); display: flex; justify-content: space-between; }

    /* ========= Section pattern ========= */
    .section { padding: 96px 0; border-top: 1px solid var(--border-1); }
    .section.warm { background: var(--warm); border-top: 1px solid rgba(240,159,56,0.18); }
    .section.ink-deep { background: var(--bg-sunken); }
    .section .eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
    .section .eyebrow .ridge { width: 28px; height: 1px; background: var(--hairline-amber); }
    .section h2 { font-family: var(--font-prop); font-weight: 700; font-size: 44px; letter-spacing: -0.022em; line-height: 1.08; margin: 0 0 18px; color: var(--fg-warm); text-wrap: pretty; max-width: 18ch; }
    .section h2 .it { font-style: italic; font-weight: 400; color: var(--amber); }
    .section .lede { font-family: var(--font-prop); font-style: italic; font-size: 19px; color: rgba(239,233,221,0.72); margin: 0 0 48px; max-width: 620px; line-height: 1.5; text-wrap: pretty; }

    /* ========= Audience strip ========= */
    .audience { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; border: 1px solid var(--border-1); border-radius: 14px; overflow: hidden; }
    .audience .col { padding: 24px 28px; border-right: 1px solid var(--border-1); }
    .audience .col:last-child { border-right: 0; }
    .audience .col .role { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--amber); margin-bottom: 6px; }
    .audience .col .name { font-family: var(--font-prop); font-size: 17px; font-weight: 700; color: var(--fg-warm); margin-bottom: 6px; }
    .audience .col .scope { font-family: var(--font-prop); font-style: italic; font-size: 13px; color: var(--fg-2); line-height: 1.5; }

    /* ========= Source triad (integrations + AI) ========= */
    .triad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .source-card { background: var(--paper); border: 1px solid var(--border-1); border-radius: 14px; padding: 28px; display: flex; flex-direction: column; gap: 14px; transition: all var(--dur-base) var(--ease); }
    .source-card:hover { border-color: rgba(240,159,56,0.4); transform: translateY(-2px); box-shadow: var(--shadow-lifted); }
    .source-card .head { display: flex; align-items: center; gap: 24px; }
    .source-card .gly { font-family: var(--font-mono); font-size: 30px; color: var(--amber); line-height: 1; }
    .source-card h3 { font-family: var(--font-prop); font-weight: 700; font-size: 20px; margin: 0; color: var(--fg-warm); }
    .source-card .vendor { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); margin-left: auto; flex-shrink: 0; }
    .source-card p { font-size: 14px; color: rgba(239,233,221,0.74); line-height: 1.6; margin: 0; }

    /* AI trust note below the AI triad */
    .ai-trust-note { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--fg-3); margin-top: 28px; max-width: 640px; line-height: 1.6; }

    /* ========= Footer ========= */
    .mk-footer { padding: 56px 0 36px; border-top: 1px solid var(--border-1); }
    .mk-footer .row { display: flex; align-items: flex-start; gap: 32px; }
    .mk-footer .signoff { margin-top: 40px; display: flex; gap: 18px; align-items: center; font-family: var(--font-mono); font-size: 11px; color: var(--mist-slate); letter-spacing: 0.08em; padding-top: 24px; border-top: 1px solid var(--border-1); flex-wrap: wrap; }
    .mk-footer .signoff .it { font-family: var(--font-prop); font-style: italic; font-size: 14px; color: rgba(239,233,221,0.72); letter-spacing: 0; }

    /* ========= Responsive ========= */

    @media (max-width: 540px) {

      .form-row { flex-direction: column; border-radius: 14px; padding: 14px; gap: 12px; }
      .form-row button { width: 100%; padding: 12px; justify-content: center; }
    }

    .gly { font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
/* global React, ReactDOM */
const { useState } = React;

// Paste your Formspree endpoint here after signing up at formspree.io
const FORMSPREE_ENDPOINT = "https://formspree.io/f/xqejkkyy";

/* ===================== Helpers ===================== */
const Glyph = ({ code, size = 16, color = "currentColor", style }) => (
  <span className="gly" style={{ fontSize: size, color, lineHeight: 1, ...style }}
        dangerouslySetInnerHTML={{ __html: "&#x" + code + ";" }}/>
);

const Mark = ({ size = 28, color = "#F09F38" }) => (
  <svg width={size} height={size} viewBox="0 0 48 48" aria-hidden="true">
    <circle cx="24" cy="24" r="3" fill={color}/>
    <path d="M14 24a10 10 0 0 1 20 0" stroke={color} strokeWidth="2" strokeLinecap="round" fill="none"/>
    <path d="M8 24a16 16 0 0 1 32 0" stroke={color} strokeWidth="2" strokeLinecap="round" opacity="0.55" fill="none"/>
  </svg>
);

const isValidEmail = (s) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s.trim());

/* ===================== Nav ===================== */
const Nav = () => (
  <div className="mk-nav">
    <div className="container">
      <div className="row">
        <a className="brand" href="#top">
          <Mark size={26}/>
          <span className="word">Normata</span>
          <span className="sub">SIGNALS</span>
        </a>
        <div className="links">
          <a href="#top" className="cta">Request a demo</a>
        </div>
      </div>
    </div>
  </div>
);

/* ===================== Hero form ===================== */
const HeroForm = () => {
  const [email, setEmail]   = useState("");
  const [intent, setIntent] = useState("demo");
  const [state, setState]   = useState("idle"); // idle | sending | sent | error
  const [error, setError]   = useState("");

  const submit = async (e) => {
    e.preventDefault();
    if (!isValidEmail(email)) {
      setError("That doesn't look like an email.");
      setState("error");
      return;
    }
    setState("sending");

    // Always save locally as a backup
    try {
      const prev = JSON.parse(localStorage.getItem("normata.signups") || "[]");
      prev.push({ email: email.trim(), intent, ts: new Date().toISOString() });
      localStorage.setItem("normata.signups", JSON.stringify(prev));
    } catch (_) {}

    // Submit to Formspree when endpoint is configured
    if (!FORMSPREE_ENDPOINT.includes("REPLACE_ME")) {
      try {
        const fd = new FormData();
        fd.append("email",    email.trim());
        fd.append("intent",   intent);
        fd.append("_subject", "Normata demo request");
        fd.append("_gotcha",  ""); // honeypot — must stay empty
        await fetch(FORMSPREE_ENDPOINT, {
          method: "POST",
          headers: { "Accept": "application/json" },
          body: fd,
        });
      } catch (_) {
        // Network failure — localStorage already captured it
      }
    }

    setError("");
    setState("sent");
  };

  if (state === "sent") {
    return (
      <div className="form-card">
        <div className="form-success" role="status">
          <span className="ic">✓</span>
          <div>
            <div className="cap">Worth a look.</div>
            <div className="body">
              We'll be in touch at <span className="m">{email.trim()}</span>{" "}
              {intent === "demo"
                ? "to schedule a short walkthrough."
                : "with a sample briefing and occasional product notes."}
            </div>
          </div>
        </div>
        <div className="form-meta">
          <a onClick={() => { setState("idle"); setEmail(""); }}
             style={{ cursor: "pointer", color: "var(--fg-2)" }}>
            ← Send another
          </a>
        </div>
      </div>
    );
  }

  return (
    <form className="form-card" onSubmit={submit} noValidate>
      <div className="form-row">
        <input
          type="email"
          name="email"
          autoComplete="email"
          placeholder="you@company.com"
          value={email}
          onChange={(e) => { setEmail(e.target.value); if (state === "error") setState("idle"); }}
          aria-label="Work email"
        />
        <button type="submit" disabled={!email || state === "sending"}>
          {state === "sending" ? "Sending…" : (intent === "demo" ? "Request a demo" : "Keep me posted")} →
        </button>
      </div>
      {state === "error" && <div className="form-error">{error}</div>}
      <div className="form-meta">
        <label>
          <input type="radio" name="intent" value="demo"
                 checked={intent === "demo"} onChange={() => setIntent("demo")}/>
          Request a demo
        </label>
        <label>
          <input type="radio" name="intent" value="updates"
                 checked={intent === "updates"} onChange={() => setIntent("updates")}/>
          Just keep me posted
        </label>
      </div>
    </form>
  );
};

/* ===================== Hero preview (person-centric briefing mock) ===================== */
const HeroPreview = () => (
  <div className="hero-preview">
    <div className="label">
      <span className="live"><span className="pulse"></span>Live · just now</span>
    </div>
    <h3>Alice — worth a check‑in this week.</h3>
    <hr/>
    <div className="item">
      <Glyph code="f198" size={15}/>
      <div>
        <div className="cap">Needs attention.</div>
        <div>
          <span className="b">Alice</span> posted in <span className="m">#eng‑platform</span> three days ago: "still waiting on infra access to unblock this." No response yet.
        </div>
      </div>
    </div>
    <div className="item">
      <Glyph code="f408" size={15}/>
      <div>
        <div className="cap">Worth a look.</div>
        <div>
          <span className="m">PR&nbsp;#4218</span> and <span className="m">PR&nbsp;#4221</span> both waiting on review for 3+ working days.
        </div>
      </div>
    </div>
    <div className="item">
      <Glyph code="f073" size={15}/>
      <div>
        <div className="cap">Worth a check‑in.</div>
        <div>
          1:1 with <span className="b">Alice</span> has run without an agenda for three weeks running.
        </div>
      </div>
    </div>
    <div className="actions">
      <button className="chip">Acknowledge</button>
      <button className="chip">Snooze 24h</button>
    </div>

);

/* ===================== Hero ===================== */
const Hero = () => (
  <section id="top" className="container">
    <div className="hero">
      <div>

        <h1>

          Normata Signals integrates with the tools your team already uses — collaboration,

        <HeroForm/>

      <HeroPreview/>
    </div>

);

/* ===================== Audience ===================== */
const Audience = () => (
  <section className="section">
    <div className="container">
      <div className="eyebrow"><span className="ridge"></span>Who it's for</div>
      <h2>Built for the people who run teams of <span className="it">five to fifteen.</span></h2>
      <p className="lede">
        High cognitive load, limited time, and a stack of tools that don't talk to each other.
      </p>
      <div className="audience">
        <div className="col">
          <div className="role">Primary</div>
          <div className="name">Engineering managers</div>
          <div className="scope">Managing 5–15 engineers across one or two teams. Signals replaces the manual pattern-checking that slips between 1:1s.</div>
        </div>
        <div className="col">
          <div className="role">Primary</div>
          <div className="name">Tech leads &amp; team leads</div>
          <div className="scope">Owning rituals, code review health, and on‑call. Signals surfaces what's falling through without adding another tool to check.</div>

        <div className="col">
          <div className="role">Primary</div>

          <div className="scope">Rollups across two or three teams. Each manager's briefing stays theirs — directors see their own direct reports only.</div>
        </div>

    </div>
  </section>
);

const Sources = () => (
  <section className="section ink-deep">
    <div className="container">
      <div className="eyebrow"><span className="ridge"></span>Integrations</div>
      <h2>Core categories. <span className="it">Read‑only.</span></h2>
      <p className="lede">
        Connect your day‑to‑day tools and pick the signals you care about from the catalog.
      </p>
      <div className="triad">
        <div className="source-card">
          <div className="head">
            <Glyph code="f198" size={28}/>
            <h3>Collaboration tools</h3>
          </div>
          <p>
            Public channel activity, thread health, and communication patterns — surfaced when

        </div>
        <div className="source-card">
          <div className="head">
            <Glyph code="f073" size={28}/>
            <h3>Calendars</h3>
          </div>
          <p>
            1:1 cadence, meeting load, and recurring ritual health — tracked passively

        </div>
        <div className="source-card">
          <div className="head">
            <Glyph code="f408" size={28}/>
            <h3>Code tools</h3>

          <p>
            PR review health, cycle time, after‑hours merge patterns, and code review

          </p>
        </div>
      </div>
    </div>
  </section>
);

/* ===================== AI ===================== */
const AI = () => (
  <section className="section warm">
    <div className="container">
      <div className="eyebrow"><span className="ridge"></span>AI‑powered</div>
      <h2>Built on language, <span className="it">not just rules.</span></h2>
      <p className="lede">
        AI is what fuses Signals into one clear picture of one person.
      </p>
      <div className="triad">
        <div className="source-card">
          <div className="head">
            <Glyph code="f0d0" size={28}/>
            <h3>Cross‑source fusion</h3>
          </div>
          <p>
            A quiet week, two stalled PRs, and a missed 1:1 each look unremarkable in
            isolation. AI correlates them across categories into a single briefing about
            one person — something no SQL rule can produce.
          </p>
        </div>
        <div className="source-card">
          <div className="head">
            <Glyph code="f002" size={28}/>
            <h3>Substance over surface</h3>
          </div>
          <p>
            Language models score things rules can't: whether a PR review was substantive
            or rubber‑stamped, whether a Slack message is a real blocker or background chatter,
            whether a PR description explains why.
          </p>
        </div>
        <div className="source-card">
          <div className="head">
            <Glyph code="f0e5" size={28}/>
            <h3>Manager‑shaped framing</h3>
          </div>
          <p>
            Every briefing is written for you. Evidence is specific, framing is
            non‑prescriptive, and your judgment is always the last step. Signals never
            acts on your behalf.
          </p>
        </div>
      </div>
      <p className="ai-trust-note">
        AI processing runs inside your org's scope boundary — data is redacted before it
        reaches any model, never used to rank individuals or compare across teams.
        Bring your own model config, or skip AI framing entirely.
      </p>
    </div>
  </section>
);

const Footer = () => (

      <div className="row">
        <div>
          <a href="#top" style={{display:"flex", alignItems:"center", gap:10, textDecoration:"none", borderBottom:0}}>

            <span style={{fontFamily:"var(--font-prop)", fontStyle:"italic", fontWeight:700, fontSize:20, color:"var(--fg-warm)"}}>Normata</span>
            <span style={{fontFamily:"var(--font-prop)", fontSize:10, letterSpacing:"0.22em", color:"var(--amber)", paddingTop:4, marginLeft:4}}>SIGNALS</span>
          </a>
          <p style={{ fontFamily: "var(--font-prop)", fontStyle: "italic", fontSize: 14, color: "rgba(239,233,221,0.72)", maxWidth: 360, marginTop: 14, lineHeight: 1.5 }}>
            Quiet intelligence for engineering managers.
          </p>
        </div>
      </div>
      <div className="signoff">
        <span className="it">© Normata, 2026</span>
        <span>·</span>
        <span>Read‑only access · EU data residency · No global ranking</span>
        <span style={{marginLeft:"auto"}}>quiet intelligence, since 2025</span>

);

const Page = () => (

  </script>
